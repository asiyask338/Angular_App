<h1>Welcome to Employee Management Portal</h1>

<div>
    <img src="https://images.unsplash.com/photo-1746712241622-e0a85ecc742f?q=80&w=725&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
        alt="" style="width:1000px; height:500px">
</div>

<div>
    <h3>Total Employees : {{ empCount() }}</h3>
</div>

<div>
    <button [routerLink]="'/employee/add'">Add Employee</button>
    <br>
    <br>
    <button [routerLink]="'/employee/edit'">Edit Employee</button>
</div>

<div>
    <h4>Recent Employees</h4>
    <ul>
        @for (employee of recentEmployees; track employee.id) {
        <li>
            <a [routerLink]="['/employee/details', employee.id]">{{ employee.name }}</a>
        </li>
        }
    </ul>
</div>
